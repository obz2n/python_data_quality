---
# docker-compose.yaml — Pipeline de Qualidade de Dados
# Serviços: postgres (metadata do Airflow) + airflow-init + airflow-webserver +
# airflow-scheduler + streamlit (dashboard)
# Uso:
#   mkdir -p ./dags ./logs ./plugins ./dataset ./resultados
#   echo "AIRFLOW_UID=$(id -u)" > .env
#   docker compose up airflow-init
#   docker compose up -d
# Airflow UI:    http://localhost:8080  (usuário/senha: airflow / airflow)
# Streamlit UI:  http://localhost:8501

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PYTHONPATH: /opt/airflow/src
  volumes:
    - ./dag:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./resultados:/opt/airflow/resultados
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - "exec /entrypoint airflow version"
    # Não chamamos "airflow db migrate" / "airflow users create" diretamente aqui:
    # o /entrypoint da imagem oficial precisa rodar primeiro porque é ele quem faz
    # o container reconhecer um UID arbitrário (o do seu host, via AIRFLOW_UID) no
    # /etc/passwd (o arquivo é group-writable para o grupo 0, por isso o "user:
    # ${AIRFLOW_UID}:0" do bloco comum é importante). Sem passar por ele, comandos
    # do airflow quebram com "getpwuid(): uid not found" quando AIRFLOW_UID != 50000
    # (o uid nativo da imagem). A migração do banco e a criação do usuário abaixo
    # são feitas pelo próprio /entrypoint, disparadas pelas variáveis
    # _AIRFLOW_DB_MIGRATE / _AIRFLOW_WWW_USER_CREATE.
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
      _AIRFLOW_WWW_USER_FIRSTNAME: Data
      _AIRFLOW_WWW_USER_LASTNAME: Quality
      _AIRFLOW_WWW_USER_EMAIL: admin@example.com
      _AIRFLOW_WWW_USER_ROLE: Admin

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./resultados:/app/resultados
    depends_on:
      - postgres
    restart: always

volumes:
  postgres-db-volume:
